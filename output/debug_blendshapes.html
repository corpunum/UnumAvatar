<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Avatar V2 Blendshape Debug</title>
<style>
  :root {
    --bg: #11100d;
    --panel: #1d1a14;
    --line: #3a3327;
    --text: #f0e9da;
    --muted: #b6ab93;
    --accent: #d2a86a;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(circle at 20% 0%, #282218, #11100d 55%);
    color: var(--text);
    font: 13px/1.4 "IBM Plex Sans", system-ui, sans-serif;
    overflow: hidden;
  }
  #app { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
  #panel {
    border-right: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.1));
    overflow: auto;
    padding: 14px;
  }
  h1 { margin: 0 0 10px; font-size: 16px; font-weight: 700; }
  .sub { color: var(--muted); margin-bottom: 12px; }
  .group { margin: 12px 0; border-top: 1px solid var(--line); padding-top: 10px; }
  .row { margin: 6px 0; }
  .label { display: flex; justify-content: space-between; color: var(--muted); }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  button {
    border: 1px solid var(--line);
    background: #2a241b;
    color: var(--text);
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 6px;
  }
  button:hover { background: #342d21; }
  #view { position: relative; }
  #hud {
    position: absolute;
    left: 10px;
    bottom: 10px;
    background: rgba(0,0,0,0.45);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    color: var(--muted);
    z-index: 2;
  }
</style>
</head>
<body>
<div id="app">
  <aside id="panel">
    <h1>Avatar Blendshape Debug</h1>
    <div class="sub">Local-only shape control for V2 rig validation.</div>
    <div>
      <button id="reset">Reset</button>
      <button id="blink">Blink Test</button>
      <button id="viseme">Viseme Sweep</button>
    </div>
    <div id="controls"></div>
  </aside>
  <main id="view"><div id="hud">Loading...</div></main>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const ARKIT_SHAPES = [
  'browDownLeft','browDownRight','browInnerUp','browOuterUpLeft','browOuterUpRight',
  'cheekPuff','cheekSquintLeft','cheekSquintRight','eyeBlinkLeft','eyeBlinkRight',
  'eyeLookDownLeft','eyeLookDownRight','eyeLookInLeft','eyeLookInRight','eyeLookOutLeft','eyeLookOutRight',
  'eyeLookUpLeft','eyeLookUpRight','eyeSquintLeft','eyeSquintRight','eyeWideLeft','eyeWideRight',
  'jawForward','jawLeft','jawOpen','jawRight','mouthClose','mouthDimpleLeft','mouthDimpleRight',
  'mouthFrownLeft','mouthFrownRight','mouthFunnel','mouthLeft','mouthLowerDownLeft','mouthLowerDownRight',
  'mouthPressLeft','mouthPressRight','mouthPucker','mouthRight','mouthRollLower','mouthRollUpper',
  'mouthShrugLower','mouthShrugUpper','mouthSmileLeft','mouthSmileRight','mouthStretchLeft','mouthStretchRight',
  'mouthUpperUpLeft','mouthUpperUpRight','noseSneerLeft','noseSneerRight','tongueOut'
];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15120d);
const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 1000);
camera.position.set(0, 1.5, 85);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById('view').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 8, 0);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 78;
controls.maxDistance = 110;
controls.minAzimuthAngle = -0.30;
controls.maxAzimuthAngle = 0.30;
controls.minPolarAngle = 1.38;
controls.maxPolarAngle = 1.78;

scene.add(new THREE.HemisphereLight(0xffffff, 0x4f4639, 1.1));
const key = new THREE.DirectionalLight(0xffffff, 0.95); key.position.set(20, 30, 90); scene.add(key);
const rim = new THREE.DirectionalLight(0xd8c0a0, 0.35); rim.position.set(-20, 10, -25); scene.add(rim);

let headMesh = null;
let morphNames = [];
let rafId = 0;
const sliders = new Map();
const shapeValues = {};
const loader = new GLTFLoader();

function setStatus(text) {
  document.getElementById('hud').textContent = text;
}

function applyShape(name, value) {
  if (!headMesh) return;
  const idx = morphNames.indexOf(name);
  if (idx >= 0) headMesh.morphTargetInfluences[idx] = value;
}

function renderControls() {
  const root = document.getElementById('controls');
  root.innerHTML = '';
  const groups = [
    ['Eyes', ARKIT_SHAPES.filter(n => n.startsWith('eye'))],
    ['Brows', ARKIT_SHAPES.filter(n => n.startsWith('brow'))],
    ['Mouth', ARKIT_SHAPES.filter(n => n.startsWith('mouth') || n === 'jawOpen' || n.startsWith('jaw') || n === 'tongueOut')],
    ['Face', ARKIT_SHAPES.filter(n => n.startsWith('cheek') || n.startsWith('nose'))]
  ];

  for (const [title, names] of groups) {
    const g = document.createElement('div');
    g.className = 'group';
    g.innerHTML = `<strong>${title}</strong>`;
    for (const name of names) {
      const row = document.createElement('div');
      row.className = 'row';
      const label = document.createElement('div');
      label.className = 'label';
      const val = document.createElement('span');
      val.textContent = '0.00';
      label.innerHTML = `<span>${name}</span>`;
      label.appendChild(val);
      const input = document.createElement('input');
      input.type = 'range';
      input.min = '0';
      input.max = '1';
      input.step = '0.01';
      input.value = '0';
      input.addEventListener('input', () => {
        const v = Number(input.value);
        shapeValues[name] = v;
        val.textContent = v.toFixed(2);
        applyShape(name, v);
      });
      row.append(label, input);
      g.appendChild(row);
      sliders.set(name, input);
      shapeValues[name] = 0;
    }
    root.appendChild(g);
  }
}

function resetAll() {
  for (const [name, el] of sliders.entries()) {
    el.value = '0';
    shapeValues[name] = 0;
    applyShape(name, 0);
    el.previousSibling.querySelector('span:last-child').textContent = '0.00';
  }
}

function resize() {
  const view = document.getElementById('view');
  const w = view.clientWidth;
  const h = view.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

function animate() {
  rafId = requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function setupActions() {
  document.getElementById('reset').addEventListener('click', resetAll);
  document.getElementById('blink').addEventListener('click', async () => {
    resetAll();
    sliders.get('eyeBlinkLeft').value = '1';
    sliders.get('eyeBlinkRight').value = '1';
    sliders.get('eyeBlinkLeft').dispatchEvent(new Event('input'));
    sliders.get('eyeBlinkRight').dispatchEvent(new Event('input'));
    await new Promise(r => setTimeout(r, 180));
    resetAll();
  });
  document.getElementById('viseme').addEventListener('click', async () => {
    const seq = [
      ['jawOpen', 0.55],
      ['mouthStretchLeft', 0.45],
      ['mouthStretchRight', 0.45],
      ['mouthFunnel', 0.55],
      ['mouthPucker', 0.65],
      ['mouthPressLeft', 0.7],
      ['mouthPressRight', 0.7]
    ];
    for (const [name, v] of seq) {
      resetAll();
      const el = sliders.get(name);
      if (!el) continue;
      el.value = String(v);
      el.dispatchEvent(new Event('input'));
      await new Promise(r => setTimeout(r, 240));
    }
    resetAll();
  });
}

renderControls();
setupActions();
resize();
window.addEventListener('resize', resize);

loader.load('unum_avatar_v6.glb?' + Date.now(), (gltf) => {
  gltf.scene.traverse((child) => {
    if (!child.isMesh) return;
    if (child.name === 'Face') {
      child.renderOrder = 10;
      if (child.material && child.material.map) {
        child.material = new THREE.MeshBasicMaterial({
          map: child.material.map,
          transparent: true,
          side: THREE.DoubleSide,
          depthWrite: false,
          depthTest: false
        });
      }
    }
    // Debug view focuses on facial rig quality. Hide all hair layers so
    // blendshape inspection is not polluted by alpha-card occlusions.
    if (child.name && child.name.startsWith('Hair')) {
      child.visible = false;
    }
    if (child.name && child.name.startsWith('Iris')) {
      child.visible = false;
    }
    if (child.name === 'TempleWisps' || child.name === 'HairlineWisps') {
      child.visible = false;
    }
    if (child.name === 'TempleWisps') {
      child.material = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setStyle('#3A2418'),
        transparent: true,
        opacity: 0.26,
        side: THREE.DoubleSide,
        depthTest: true,
        depthWrite: false
      });
      child.renderOrder = 6;
    }
    if (child.name === 'HairlineWisps') {
      child.material = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setStyle('#24140C'),
        transparent: true,
        opacity: 0.09,
        side: THREE.DoubleSide,
        depthTest: true,
        depthWrite: false
      });
      child.renderOrder = 6;
    }
    if (child.isMesh && child.morphTargetInfluences && child.morphTargetDictionary) {
      headMesh = child;
      morphNames = Object.keys(child.morphTargetDictionary);
    }
  });
  scene.add(gltf.scene);
  setStatus(`Loaded. Morphs: ${morphNames.length}`);
  animate();
}, undefined, (err) => {
  console.error(err);
  setStatus('Failed to load model.');
});
</script>
</body>
</html>
