<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Unum Avatar - Talking Demo</title>
<style>
  body { margin: 0; background: #080c14; overflow: hidden; font-family: sans-serif; }
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
  }
  #info {
    position: absolute; top: 10px; left: 10px; color: #0ff; font-size: 14px;
    background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px;
  }
  #controls {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 14px;
    background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 8px;
    display: flex; gap: 12px; align-items: center;
  }
  button {
    background: #0ff; color: #000; border: none; padding: 8px 20px;
    border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: bold;
  }
  button:hover { background: #00dddd; }
  #speak-input {
    background: rgba(255,255,255,0.1); border: 1px solid #0ff; color: #fff;
    padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 300px;
  }
  #status { color: #0ff; font-size: 12px; }
</style>
</head>
<body>

<div id="vignette"></div>
<div id="info">
  <strong>Unum Avatar - Talking Demo</strong><br>
  <span id="stats"></span><br>
  <span id="status">Ready</span>
</div>

<div id="controls">
  <button id="playBtn">▶ Play Demo</button>
  <input id="speak-input" type="text" placeholder="Type text to speak..." />
  <button id="speakBtn">Speak</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 75);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.setClearColor(new THREE.Color(0x0d0d1a), 1);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 8, 0);
controls.enableDamping = true;

// Studio backdrop — subtle radial gradient behind head
// Studio backdrop — radial gradient
{
  const bgCanvas = document.createElement('canvas');
  bgCanvas.width = 512; bgCanvas.height = 512;
  const bgCtx = bgCanvas.getContext('2d');
  const grad = bgCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
  grad.addColorStop(0,   '#1e2546');
  grad.addColorStop(0.5, '#111828');
  grad.addColorStop(1,   '#080c14');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, 512, 512);
  const bgTex = new THREE.CanvasTexture(bgCanvas);
  const bgPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(130, 130),
    new THREE.MeshBasicMaterial({ map: bgTex, depthWrite: false })
  );
  bgPlane.position.set(0, 0, -25);
  bgPlane.renderOrder = -10;
  scene.add(bgPlane);
}

// Head shadow halo — soft dark ellipse just behind face to simulate head volume
{
  const haloCanvas = document.createElement('canvas');
  haloCanvas.width = 256; haloCanvas.height = 320;
  const hCtx = haloCanvas.getContext('2d');
  const hGrad = hCtx.createRadialGradient(128, 160, 20, 128, 150, 128);
  hGrad.addColorStop(0,    'rgba(8,12,22,0.88)');   // dark blue-tinted, matches background
  hGrad.addColorStop(0.55, 'rgba(10,14,26,0.72)');
  hGrad.addColorStop(1,    'rgba(10,14,26,0)');
  hCtx.fillStyle = hGrad;
  hCtx.fillRect(0, 0, 256, 320);
  const haloTex = new THREE.CanvasTexture(haloCanvas);
  const haloPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 62),
    new THREE.MeshBasicMaterial({ map: haloTex, transparent: true, depthWrite: false })
  );
  haloPlane.position.set(0, 10, -3);
  haloPlane.renderOrder = -5;
  scene.add(haloPlane);
}

// Lighting — three-point studio setup
scene.add(new THREE.AmbientLight(0x404060, 1.8));
const keyLight = new THREE.DirectionalLight(0xfff0e8, 2.5);  // warm key
keyLight.position.set(20, 25, 60);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x6090cc, 0.4);  // cool fill (reduced to avoid tinting transparent materials)
fillLight.position.set(-40, 5, 40);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 0.8);   // rim/back
rimLight.position.set(0, 30, -50);
scene.add(rimLight);
const underLight = new THREE.DirectionalLight(0x203050, 0.4); // subtle bounce
underLight.position.set(0, -30, 20);
scene.add(underLight);

let headMesh = null;
let morphNames = [];
let lipsyncData = null;
let audioCtx = null;

// Load GLB
const loader = new GLTFLoader();
loader.load('unum_avatar_v6.glb?' + Date.now(), (gltf) => {
  gltf.scene.traverse((child) => {
    if (child.isMesh) {
      if (child.morphTargetInfluences && child.morphTargetInfluences.length > 0) {
        headMesh = child;
        window.__headMesh = child;
        child.renderOrder = 10;
        // Use unlit material to preserve exact photo texture colors without lighting tint
        if (child.material && child.material.map) {
          const faceMap = child.material.map;
          child.material = new THREE.MeshBasicMaterial({
            map: faceMap,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
            morphTargets: true,
          });
        }
      }
      if (child.name && child.name.startsWith('Eyeball')) {
        // Photo-eye patch quad: unlit, transparent edges, renders after face
        child.renderOrder = 12;
        if (child.material && child.material.map) {
          const eyeMap = child.material.map;
          child.material = new THREE.MeshBasicMaterial({
            map: eyeMap,
            transparent: true,
            opacity: 1.0,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
        }
      }
      if (child.name && child.name.startsWith('EyelidOccluder')) {
        child.renderOrder = 5;
      }
    }
  });

  // Apply unlit materials to skin/hair meshes so they match face quality
  gltf.scene.traverse(child => {
    if (child.isMesh && child.name) {
      // Cranium and ears: unlit warm skin tone (#AB6E51 sRGB)
      if (child.name.startsWith('Cranium') || child.name.startsWith('Ear')) {
        child.material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setStyle('#AB6E51'),
          side: THREE.FrontSide
        });
        child.renderOrder = 1;
      }
      // Neck: unlit skin, renders behind face
      if (child.name.startsWith('Neck')) {
        child.material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setStyle('#A65645'),
          side: THREE.FrontSide
        });
        child.renderOrder = 0;
      }
      // Hair cap: renders after cranium, ignores depth so it paints over it;
      // face (renderOrder=10) then paints over hair in the face region.
      if (child.name.startsWith('HairCap')) {
        child.material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setStyle('#29241F'),
          side: THREE.DoubleSide,
          depthTest: false,
          depthWrite: false,
        });
        child.renderOrder = 3;
      }
      // MouthCavity: render after cranium, ignore depth so it shows over skin
      if (child.name === 'MouthCavity') {
        child.material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setStyle('#1A0804'),
          side: THREE.DoubleSide,
          depthTest: false,
          depthWrite: false,
        });
        child.renderOrder = 5;
      }
      // Teeth: show when jaw opens (white)
      if (child.name === 'Teeth') {
        child.material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setStyle('#EBE8D8'),
          side: THREE.DoubleSide,
          depthTest: false,
          depthWrite: false,
        });
        child.renderOrder = 6;
      }
    }
  });

  scene.add(gltf.scene);

  const geo = headMesh.geometry;
  // Find morph target names from any mesh that has them
  morphNames = [];
  for (const meshDef of gltf.parser.json.meshes) {
    if (meshDef.extras?.targetNames) {
      morphNames = meshDef.extras.targetNames;
      break;
    }
  }
  document.getElementById('stats').textContent =
    `${geo.attributes.position.count} verts · ${geo.index.count / 3} tris · ${morphNames.length} morphs`;

  window.__headMesh = headMesh;
  window.__scene = scene;
  console.log('Model loaded, morphs:', morphNames, 'headMesh:', !!headMesh);
});

// Load lipsync data
fetch('speech_lipsync.json?' + Date.now())
  .then(r => r.json())
  .then(data => { lipsyncData = data; window.__ready = true; console.log('Lipsync loaded:', data.frames.length, 'frames'); });

// Blendshape animation
let animStartTime = 0;
let isAnimating = false;
let currentAudio = null;

function getMorphIndex(name) {
  return morphNames.indexOf(name);
}

function setMorph(name, value) {
  if (!headMesh) return;
  const idx = getMorphIndex(name);
  if (idx >= 0) headMesh.morphTargetInfluences[idx] = value;
}

function resetMorphs() {
  if (!headMesh) return;
  for (let i = 0; i < morphNames.length; i++) {
    headMesh.morphTargetInfluences[i] = 0;
  }
}

let speechBlinkTimer = 0;
let speechBlinkState = 0;  // 0=open, 1=closing, 2=opening

function updateSpeechBlink(dt) {
  speechBlinkTimer -= dt;
  if (speechBlinkTimer <= 0 && speechBlinkState === 0) {
    // Start a blink every 3-5s randomly
    speechBlinkTimer = 3.5 + Math.random() * 2.0;
    speechBlinkState = 1;
    speechBlinkPhase = 0;
  }
}
let speechBlinkPhase = 0;

function applySpeechBlink(dt) {
  if (speechBlinkState === 0) {
    setMorph('eyeBlinkLeft', 0);
    setMorph('eyeBlinkRight', 0);
    return;
  }
  speechBlinkPhase += dt;
  if (speechBlinkState === 1) {  // closing fast (0.07s)
    const t = Math.min(speechBlinkPhase / 0.07, 1.0);
    setMorph('eyeBlinkLeft', t);
    setMorph('eyeBlinkRight', t);
    if (t >= 1.0) { speechBlinkState = 2; speechBlinkPhase = 0; }
  } else if (speechBlinkState === 2) {  // opening slow (0.15s)
    const t = Math.min(speechBlinkPhase / 0.15, 1.0);
    setMorph('eyeBlinkLeft', 1.0 - t);
    setMorph('eyeBlinkRight', 1.0 - t);
    if (t >= 1.0) { speechBlinkState = 0; speechBlinkPhase = 0; }
  }
}

function updateLipSync(time) {
  if (!lipsyncData || !isAnimating) return;

  const elapsed = time - animStartTime;
  if (elapsed > lipsyncData.duration) {
    isAnimating = false;
    resetMorphs();
    document.getElementById('status').textContent = 'Done';
    return;
  }

  // Find current frame
  const frames = lipsyncData.frames;
  let frame = frames[0];
  for (let i = 0; i < frames.length; i++) {
    if (frames[i].time <= elapsed) {
      frame = frames[i];
    } else {
      // Interpolate between frames with smoothstep easing
      const prev = frames[i - 1] || frames[0];
      const next = frames[i];
      const t = (elapsed - prev.time) / (next.time - prev.time);
      const st = t * t * (3 - 2 * t);  // smoothstep
      frame = {};
      for (const key of Object.keys(prev)) {
        if (key === 'time') continue;
        frame[key] = prev[key] + (next[key] - prev[key]) * st;
      }
      break;
    }
  }

  // Viseme resolver: prevent mouthClose from canceling jawOpen/mouthOpen
  const rawJaw   = frame.jawOpen   || 0;
  const rawClose = frame.mouthClose || 0;
  const rawOpen  = frame.mouthOpen  || 0;
  const rawFunnel= frame.mouthFunnel|| 0;
  const rawPucker= frame.mouthPucker|| 0;

  // Opening signals win over closing signals
  const openSignal  = Math.max(rawJaw, rawOpen, rawFunnel * 0.5);
  const closeSignal = rawClose * Math.max(0, 1.0 - openSignal * 1.5);

  setMorph('jawOpen',    Math.min(rawJaw * 1.8, 1.0));   // boost jaw 80%
  setMorph('mouthOpen',  Math.min(rawOpen * 1.6, 1.0));
  setMorph('mouthClose', closeSignal);
  setMorph('mouthFunnel', rawFunnel);
  setMorph('mouthPucker', rawPucker);
  setMorph('mouthSmileLeft',  frame.mouthSmileLeft  || 0);
  setMorph('mouthSmileRight', frame.mouthSmileRight || 0);
}

// Add subtle idle animation (breathing, micro eye movements)
let idleTime = 0;
function updateIdle(dt) {
  if (isAnimating) return;
  idleTime += dt;
  // Subtle breathing
  setMorph('jawOpen', Math.sin(idleTime * 0.8) * 0.02 + 0.01);
  // Occasional blink — vary period 3-6s, asymmetric close/open (fast close, slow open)
  const blinkPeriod = 4.5;
  const blinkCycle = idleTime % blinkPeriod;
  const bStart = blinkPeriod - 0.22;
  if (blinkCycle > bStart) {
    const bPhase = (blinkCycle - bStart) / 0.22;  // 0→1
    // Fast close (first 40%), slow open (remaining 60%)
    let blinkVal;
    if (bPhase < 0.4) {
      blinkVal = bPhase / 0.4;                // 0→1 fast close
    } else {
      blinkVal = 1.0 - (bPhase - 0.4) / 0.6; // 1→0 slow open
    }
    setMorph('eyeBlinkLeft', blinkVal);
    setMorph('eyeBlinkRight', blinkVal);
  } else {
    setMorph('eyeBlinkLeft', 0);
    setMorph('eyeBlinkRight', 0);
  }
}

// Play demo
document.getElementById('playBtn').addEventListener('click', () => {
  if (!headMesh || !lipsyncData) {
    document.getElementById('status').textContent = 'Loading...';
    return;
  }

  const audio = new Audio('speech.wav?' + Date.now());
  audio.play();
  currentAudio = audio;
  animStartTime = performance.now() / 1000;
  isAnimating = true;
  document.getElementById('status').textContent = 'Speaking...';
});

// Speak custom text (requires server-side TTS)
document.getElementById('speakBtn').addEventListener('click', async () => {
  const text = document.getElementById('speak-input').value.trim();
  if (!text) return;

  document.getElementById('status').textContent = 'Generating speech...';

  try {
    const resp = await fetch('/api/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!resp.ok) throw new Error('Server error');
    const data = await resp.json();

    // Reload lipsync data
    const lsResp = await fetch(data.lipsync + '?' + Date.now());
    lipsyncData = await lsResp.json();

    const audio = new Audio(data.audio + '?' + Date.now());
    audio.play();
    currentAudio = audio;
    animStartTime = performance.now() / 1000;
    isAnimating = true;
    document.getElementById('status').textContent = 'Speaking...';
  } catch (e) {
    document.getElementById('status').textContent = 'TTS server not running. Use demo button.';
  }
});

// Subtle camera sway — disabled during deterministic recording
const camBasePos = { x: 0, y: 1.5, z: 88 };  // pulled back + slightly up to show hair
let swayEnabled = true;
function updateCameraSway(now) {
  if (!swayEnabled) return;
  camera.position.x = camBasePos.x + Math.sin(now * 0.31) * 0.18 + Math.sin(now * 0.73) * 0.08;
  camera.position.y = camBasePos.y + Math.sin(now * 0.47) * 0.12 + Math.sin(now * 0.19) * 0.06;
}

// Deterministic render-at-time for offline 30fps capture
window.renderFrameAt = function(t) {
  if (!headMesh || !lipsyncData) return;
  resetMorphs();
  animStartTime = 0;
  isAnimating = (t < lipsyncData.duration);
  updateLipSync(t);
  // Deterministic blink at t
  const blinkPeriod = 4.5;
  const blinkCycle = t % blinkPeriod;
  const bStart = blinkPeriod - 0.22;
  if (blinkCycle > bStart) {
    const bPhase = (blinkCycle - bStart) / 0.22;
    const blinkVal = bPhase < 0.4 ? bPhase / 0.4 : 1.0 - (bPhase - 0.4) / 0.6;
    setMorph('eyeBlinkLeft', blinkVal);
    setMorph('eyeBlinkRight', blinkVal);
  }
  // Fixed camera during recording
  camera.position.set(camBasePos.x, camBasePos.y, camBasePos.z);
  controls.update();
  renderer.render(scene, camera);
};

// Animation loop
let lastTime = performance.now() / 1000;
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now() / 1000;
  const dt = now - lastTime;
  lastTime = now;

  updateLipSync(now);
  if (isAnimating) { updateSpeechBlink(dt); applySpeechBlink(dt); }
  updateIdle(dt);
  updateCameraSway(now);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
